name: deploy-4practice
on:
  push:
    paths:
      - "04 Practice Project (Start)/**"

defaults:
  run:
    working-directory: "04 Practice Project (Start)"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: npm tests
        run: npm test
      - name: run lint
        run: npm run lint
      - name: build
        run: npm run build
      - name: deploy
        run: echo "deployed"
